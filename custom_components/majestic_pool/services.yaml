send_command:
  name: Send command
  description: Send a raw Majestic BLE command.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry id when multiple devices are configured.
      required: false
      selector:
        text:
    command:
      name: Command
      description: Command byte (0-255).
      required: true
      selector:
        number:
          min: 0
          max: 255
          mode: box
    payload:
      name: Payload
      description: Optional payload as hex string (e.g. 0102ff) or list of bytes.
      required: false
      example: "0102ff"
      selector:
        text:

refresh:
  name: Refresh
  description: Force a data refresh from controller.
  fields:
    entry_id:
      name: Entry ID
      description: Optional config entry id when multiple devices are configured.
      required: false
      selector:
        text:
